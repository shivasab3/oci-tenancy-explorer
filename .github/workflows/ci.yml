name: Build and Test

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install oci

      - name: Build check (Python compile)
        run: |
          python -m py_compile \
            build_fleet_data.py \
            build_shape_data.py \
            build_announcements_data.py \
            build_opportunities_data.py \
            portal_server.py

      - name: Smoke test CLI entrypoints
        run: |
          python build_fleet_data.py --help
          python build_shape_data.py --help
          python build_announcements_data.py --help
          python build_opportunities_data.py --help
          python portal_server.py --help

      - name: Validate sample JSON schema shape
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("fleet_data_sample_json/fleet_data.sample.json").read_text())
          required_root = {"generatedAt", "generatedAtEpochMs", "schemaVersion", "source", "customers", "instances"}
          missing = sorted(required_root - payload.keys())
          if missing:
              raise SystemExit(f"Missing root keys: {missing}")

          if not isinstance(payload["customers"], list):
              raise SystemExit("customers must be a list")
          if not isinstance(payload["instances"], list):
              raise SystemExit("instances must be a list")

          print("Sample JSON schema checks passed.")
          PY

      - name: Build Docker image
        run: |
          docker build -t oci-tenancy-explorer:ci .
